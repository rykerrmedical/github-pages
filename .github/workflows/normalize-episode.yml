name: Normalize Episode Audio (LUFS)

on:
  workflow_dispatch:
    inputs:
      archive_identifier:
        description: "Archive.org item identifier (e.g. the-combat-midwife)"
        required: true
        type: string

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Install ffmpeg and Python tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install --upgrade pip
          pip install internetarchive ffmpeg-normalize

      - name: Configure Archive.org credentials
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          mkdir -p ~/.config/internetarchive
          cat > ~/.config/internetarchive/ia.ini << EOF
          [s3]
          access = ${IA_ACCESS_KEY}
          secret = ${IA_SECRET_KEY}
          EOF

      - name: Download episode audio
        id: fetch
        run: |
          IDENTIFIER="${{ github.event.inputs.archive_identifier }}"
          mkdir -p download
          ia download "$IDENTIFIER" --glob "*.mp3" --destdir=download

          FILE=$(find download -iname "*.mp3" | head -n 1)
          if [ -z "$FILE" ]; then
            echo "No mp3 file found for identifier: $IDENTIFIER"
            exit 1
          fi

          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "filename=$(basename "$FILE")" >> "$GITHUB_OUTPUT"

      - name: Normalize to -16 LUFS
        run: |
          mkdir -p normalized
          SRC="${{ steps.fetch.outputs.file }}"
          NAME="${{ steps.fetch.outputs.filename }}"

          # Preserve original bitrate so quality isn't degraded
          BITRATE=$(ffprobe -v error -select_streams a:0 \
            -show_entries stream=bit_rate -of default=noprint_wrappers=1:nokey=1 "$SRC")
          BITRATE=${BITRATE:-128000}
          BITRATE_K="$((BITRATE / 1000))k"

          ffmpeg-normalize "$SRC" \
            -c:a libmp3lame \
            -b:a "$BITRATE_K" \
            -t -16 -tp -1.5 -lrt 11 \
            -o "normalized/$NAME" -f

      - name: Re-upload normalized audio
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          IDENTIFIER="${{ github.event.inputs.archive_identifier }}"
          NAME="${{ steps.fetch.outputs.filename }}"
          ia upload "$IDENTIFIER" "normalized/$NAME" --no-derive

      - name: Summary
        run: |
          echo "Normalized and re-uploaded: ${{ steps.fetch.outputs.filename }}"
          echo "Item: ${{ github.event.inputs.archive_identifier }}"
